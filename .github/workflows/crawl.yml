name: Collect job postings

# git scraping 패턴: cron으로 Greenhouse/Lever 공개 API를 수집해 data/jobs.json을 커밋.
on:
  schedule:
    - cron: "0 */6 * * *"   # 6시간마다 (UTC).
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write            # data/jobs.json 커밋을 위해 필요

concurrency:
  group: collect-jobs
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r collector/requirements.txt

      - name: Collect (Greenhouse/Lever 공개 API → data/jobs.json)
        run: python collector/crawl.py

      - name: Commit data/jobs.json if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update job postings"
          file_pattern: data/jobs.json
